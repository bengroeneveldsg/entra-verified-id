# ---------------------------------------------------------------------------
# nginx.conf — Verified ID Frontend
#
# This file is TEMPLATE-processed by envsubst at container start-up.
# Required env vars:
#   API_URL              — upstream API base URL, e.g. https://api.bgamzn.com
#   HOSTING_BUCKET_URL   — CloudFront/S3 origin for /.well-known/ DID docs
# ---------------------------------------------------------------------------

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ── Static assets — long-lived immutable cache ───────────────────────
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ── DNS resolver (required when proxy_pass uses a variable / full URL) ─
        resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

        # ── API proxy ────────────────────────────────────────────────────────
        # After envsubst, ${API_URL} becomes the literal upstream base URL.
        # We store it in a variable so nginx performs DNS re-resolution.
        set $upstream_api ${API_URL};

        location /api/ {
            proxy_pass         $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $proxy_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # No caching for API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── DID / well-known documents ───────────────────────────────────────
        set $upstream_hosting ${HOSTING_BUCKET_URL};

        location /.well-known/ {
            proxy_pass         $upstream_hosting;
            proxy_http_version 1.1;
            proxy_set_header   Host              $proxy_host;
            proxy_set_header   Connection        "";

            # Allow moderate caching — DID docs rarely change
            add_header Cache-Control "public, max-age=3600" always;
        }

        # ── SPA fallback (HTML5 history API) ─────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }
    }
}
